baseURL = "https://blog-b3g.pages.dev/"
languageCode = "zh-cn"
title = "刘露西西 / 人生指南针"
theme = "PaperMod"

enableRobotsTXT = true
[pagination]
  pagerSize = 20

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  defaultTheme = "auto"
  disableThemeToggle = false

  ShowReadingTime = true
  ShowWordCount = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowPostNavLinks = true

  # 极简：少装饰，多正文
  ShowToc = false

  [params.homeInfoParams]
    Title = "人生指南针"
    Content = "把 Notion 里的笔记，变成可检索、可发布的文章。"

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 2
    keys = ["title", "permalink", "summary", "content"]

[menu]
  [[menu.main]]
    name = "文章"
    url = "/posts/"
    weight = 1

  [[menu.main]]
    name = "标签"
    url = "/tags/"
    weight = 2

  [[menu.main]]
    name = "搜索"
    url = "/search/"
    weight = 3

  [[menu.main]]
    name = "归档"
    url = "/archives/"
    weight = 4

  [[menu.main]]
    name = "关于"
    url = "/about/"
    weight = 5

[markup]
  [markup.highlight]
    noClasses = false
