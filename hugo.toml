baseURL = "https://lucille-blog.pages.dev/"
languageCode = "zh-cn"
title = "刘露西西 / Lucille"
theme = "PaperMod"

enableRobotsTXT = true
[pagination]
  pagerSize = 20

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  defaultTheme = "light"
  disableThemeToggle = true

  ShowReadingTime = true
  ShowWordCount = false
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  ShowPostNavLinks = true
  ShowToc = false

  [params.homeInfoParams]
    Title = "刘露西西 / Lucille"
    Content = "你选择的视角就是你想体验的世界"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 2
    keys = ["title", "permalink", "summary", "content"]

[menu]
  [[menu.main]]
    name = "文章"
    url = "/posts/"
    weight = 1

  [[menu.main]]
    name = "标签"
    url = "/tags/"
    weight = 2

  [[menu.main]]
    name = "搜索"
    url = "/search/"
    weight = 3

  [[menu.main]]
    name = "归档"
    url = "/archives/"
    weight = 4

  [[menu.main]]
    name = "关于"
    url = "/about/"
    weight = 5

[markup]
  [markup.highlight]
    noClasses = false
